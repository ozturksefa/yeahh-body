    <title>Yeahh Body</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">

    <meta name="theme-color" content="#E02020" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Force clear old service workers and caches
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
      }
      if ('caches' in window) {
        caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
      }
      // Global error recovery — never show blank screen
      window.addEventListener('error', function(e) {
        console.error('App crash:', e.error);
        if (document.getElementById('root')?.innerHTML === '') {
          localStorage.removeItem('yb_flow');
          document.getElementById('root').innerHTML = '<div style="color:#fff;text-align:center;padding:40px;font-family:sans-serif"><h2>Bir hata oluştu</h2><button onclick="localStorage.clear();location.reload()" style="padding:12px 24px;background:#D41920;color:#fff;border:none;border-radius:8px;font-size:16px;margin-top:16px;cursor:pointer">Yeniden Başlat</button></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
