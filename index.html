<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Dev-permissive meta CSP. Production CSP is enforced by netlify.toml
         (stricter: no unsafe-eval). When both apply, browsers enforce the
         intersection, so the production header remains authoritative. -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' blob: data:;
               frame-src https://www.youtube.com https://www.youtube-nocookie.com;
               img-src 'self' data: https://*.ytimg.com https://*.ggpht.com https://static.exercisedb.dev;
               script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://s.ytimg.com;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src https://fonts.gstatic.com;
               connect-src 'self' ws: wss: https://www.youtube.com https://*.supabase.co https://api.anthropic.com;">
    <title>Yeahh Body</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E02020" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register service worker (production only — dev uses Vite HMR which
      // conflicts with SW caching). SW is scoped to '/' and handles app-
      // shell + ExerciseDB GIF offline caching. See public/sw.js.
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.warn('SW registration failed:', err);
          });
        });
      } else if ('serviceWorker' in navigator) {
        // On dev host, actively kill any previously-installed SW so the old
        // kill-switch version from history doesn't sit around.
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      // Global error recovery — never show blank screen
      window.addEventListener('error', function(e) {
        console.error('App crash:', e.error);
        if (document.getElementById('root')?.innerHTML === '') {
          localStorage.removeItem('yb_flow');
          document.getElementById('root').innerHTML = '<div style="color:#fff;text-align:center;padding:40px;font-family:sans-serif"><h2>Bir hata oluştu</h2><button onclick="localStorage.clear();location.reload()" style="padding:12px 24px;background:#D41920;color:#fff;border:none;border-radius:8px;font-size:16px;margin-top:16px;cursor:pointer">Yeniden Başlat</button></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
